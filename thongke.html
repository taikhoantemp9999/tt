<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Thống kê khảo sát - Khảo sát ATTT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .back-btn {
            background: #fff;
            color: #475569;
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Stats Styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stats-card {
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .stats-card h3 {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 12px;
        }
        .stats-card .value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
        }
        .stats-table-wrapper {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }
        .stats-table th, .stats-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .stats-table th {
            background: #f8fafc;
            font-weight: 700;
            color: #475569;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .stats-table tr:hover {
            background: #fdfdfd;
        }
        .stats-table tr:last-child td {
            border-bottom: none;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 900;
            color: #1e293b;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 900;
            color: #1e293b;
        }
        .modal-close {
            background: #f1f5f9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }
        .modal-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .modal-item:hover {
            border-color: var(--primary);
            background: #f0f9ff;
            transform: translateX(4px);
        }
        .modal-item .name { font-weight: 800; color: #1e293b; }
        .modal-item .sub { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

        .clickable-stat:hover {
            color: var(--primary);
            opacity: 0.8;
        }

        /* Calendar Styles */
        .calendar-container {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 8px 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            /* Full width allowed */
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .calendar-header h3 {
            font-size: 0.9rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }
        .calendar-nav {
            display: flex;
            gap: 4px;
        }
        .nav-btn {
            background: #f1f5f9;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: all 0.2s;
            font-size: 0.7rem;
        }
        .nav-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .calendar-day-head {
            text-align: center;
            font-size: 0.6rem;
            font-weight: 700;
            color: #94a3b8;
            padding: 2px 0;
            text-transform: uppercase;
        }
        .calendar-day {
            /* aspect-ratio: 2.2; */ /* Remove aspect ratio to let height be minimal */
            border-radius: 4px;
            border: 1px solid #f1f5f9;
            padding: 2px 6px;
            display: flex;
            flex-direction: row; /* Thay đổi thành hàng ngang */
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            background: #fcfcfc;
            min-height: 24px; /* Rất mỏng */
        }
        .calendar-day.empty {
            background: transparent;
            border: none;
        }
        .calendar-day .day-num {
            font-size: 0.7rem;
            font-weight: 700;
            color: #94a3b8;
        }
        .calendar-day.today {
            border: 1px solid var(--primary);
            background: #f0f9ff;
        }
        .calendar-day.today .day-num {
            color: var(--primary);
        }
        .calendar-day .day-count {
            /* align-self: flex-start; */
            background: #fee2e2;
            color: #ef4444;
            padding: 0 4px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: 900;
            cursor: pointer;
            display: none;
            text-align: right;
            white-space: nowrap;
            /* margin-top: -2px; */
        }
        .calendar-day.has-events {
            background: #fff;
            border-color: #cbd5e1;
        }
        .calendar-day.has-events .day-count {
            display: block;
        }
        .calendar-day.has-events .day-num {
            color: #475569;
        }
        .calendar-day.has-events:hover {
            border-color: var(--primary);
            z-index: 1;
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>Thống kê tổng quan</h1>
                <p>Theo dõi tiến độ khảo sát và viết hồ sơ trực thuộc quản lý.</p>
            </div>
        </header>

        <main>
            <div class="topbar">
                <a href="list.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Quay lại danh sách
                </a>
                <div id="roleBadge" class="role-badge" 
                     style="padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border); background: #fff; font-weight: 800; color: #334155; font-size: 0.9rem;">
                     Đang tải...
                </div>
            </div>

            <div id="statsDashboard">
                <div class="empty-state">Đang tính toán dữ liệu...</div>
            </div>
        </main>
    </div>

    <!-- Modal for Drill-down -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Danh sách chi tiết</h2>
                <button class="modal-close" onclick="closeStatsModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- List will be injected here -->
            </div>
        </div>
    </div>

    <script src="auth.js?v=20260317"></script>
    <script src="thongke.js?v=20260317"></script>
</body>

</html>
